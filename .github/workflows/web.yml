name: Web CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "mankas_tv/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "mankas_tv/**"
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
