name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - "mankas_tv/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    branches: [main]
    paths:
      - "mankas_tv/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mankas_tv

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: mankas_tv/.fvm/flutter_sdk_version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --debug
